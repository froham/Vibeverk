<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arbeidsområde — laster…</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">

  <style>
    /* =========================================================================
       WORKSPACE SHELL CSS
       Neutrale standardfargar for Workspace — uavhengig av nettside-branding.
       core.js set --color-primary frå config.colors, men applyWorkspaceTheme()
       i intranet-core.js overrider primærfarga med workspace.accentColor etterpå.
       ====================================================================== */
    :root {
      --color-primary:   #2563eb;
      --color-secondary: #7c3aed;
      --color-bg:        #f1f5f9;
      --font-display:    "Inter", system-ui, sans-serif;
      --font-body:       "Inter", system-ui, sans-serif;
      --color-text:      #0f172a;
      --color-muted:     #64748b;
      --color-surface:   #ffffff;
      --color-border:    color-mix(in srgb, var(--color-text) 12%, transparent);
      --color-alt:       color-mix(in srgb, var(--color-primary) 5%, var(--color-bg));
      --color-tint:      color-mix(in srgb, var(--color-primary) 10%, var(--color-bg));
      --radius:          14px;
      --gap:             clamp(1rem, 2vw, 1.5rem);
      --sidebar-w:       220px;
    }

    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0; height: 100%;
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.2; margin: 0; }
    a { color: var(--color-primary); text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* --- Layout: sidebar + main ------------------------------------------ */
    #intranet {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
    }

    /* --- Sidebar ---------------------------------------------------------- */
    .i-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .i-sidebar__brand {
      padding: 1.2rem 1rem 1rem;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }
    .i-sidebar__name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-text);
      letter-spacing: -.01em;
    }
    .i-sidebar__label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--color-muted);
    }
    .i-nav {
      padding: .75rem 0;
      flex: 1;
    }
    .i-nav__link {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .6rem 1rem;
      color: var(--color-text);
      font-size: .9rem;
      font-weight: 500;
      border-radius: 0;
      opacity: .75;
      transition: opacity .15s, background .15s;
      cursor: pointer;
    }
    .i-nav__link:hover { opacity: 1; background: var(--color-alt); }
    .i-nav__link.is-active {
      opacity: 1;
      background: var(--color-tint);
      color: var(--color-primary);
      font-weight: 600;
    }
    .i-nav__icon { font-size: 1.1rem; flex-shrink: 0; }
    .i-nav__section { margin-top: .5rem; }
    .i-nav__section-label {
      display: flex; align-items: center; gap: .4rem;
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--color-muted);
      padding: .55rem 1rem .25rem;
    }
    .i-sidebar__footer {
      padding: .9rem 1rem;
      border-top: 1px solid var(--color-border);
      font-size: .78rem;
      color: var(--color-muted);
    }
    .i-sidebar__user { font-weight: 600; color: var(--color-text); }

    /* --- Topbar + innhold ------------------------------------------------- */
    .i-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .i-topbar {
      height: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      border-bottom: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-bg) 92%, transparent);
      backdrop-filter: blur(8px);
      gap: 1rem;
    }
    .i-topbar__title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
    }
    .i-topbar__back {
      background: none; border: 0; cursor: pointer;
      color: var(--color-muted); font: inherit; font-size: .88rem;
      display: flex; align-items: center; gap: .3rem;
      padding: .3rem 0;
    }
    .i-topbar__back:hover { color: var(--color-primary); }

    .i-main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.6rem;
    }

    /* --- Knapper (speiler rot) -------------------------------------------- */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font: inherit; font-weight: 600; cursor: pointer;
      padding: .7rem 1.2rem; border-radius: 999px; border: 1.5px solid transparent;
      transition: transform .15s, background .2s, box-shadow .2s, opacity .2s;
      text-decoration: none; line-height: 1; font-size: .9rem;
    }
    .btn:active { transform: translateY(1px); }
    .btn--primary   { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { box-shadow: 0 6px 18px color-mix(in srgb, var(--color-primary) 35%, transparent); }
    .btn--ghost     { background: transparent; color: var(--color-text); border-color: var(--color-border); }
    .btn--ghost:hover { background: var(--color-tint); }
    .btn--danger    { background: transparent; color: #c0392b; border-color: #c0392b; }
    .btn--danger:hover { background: #fff0ef; }
    .btn--sm { padding: .45rem .85rem; font-size: .82rem; }

    /* --- Cards / lister --------------------------------------------------- */
    .i-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
    }
    .i-card + .i-card { margin-top: .6rem; }
    .i-card-grid > .i-card { margin-top: 0; }

    .admin-list { list-style: none; padding: 0; margin: 0; display: grid; gap: .5rem; }
    .admin-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 12px; padding: .75rem 1rem;
    }
    .admin-row__main { display: grid; gap: .15rem; min-width: 0; }
    .admin-row__meta { color: var(--color-muted); font-size: .8rem; }
    .admin-row__actions { display: flex; gap: .4rem; flex-shrink: 0; }

    /* --- Skjema ----------------------------------------------------------- */
    .i-form { display: grid; gap: .9rem; align-items: start; }
    .i-field { display: grid; gap: .3rem; }
    .i-field label { font-size: .85rem; font-weight: 600; }
    .i-field input:not([type="checkbox"]):not([type="radio"]), .i-field textarea, .i-field select {
      width: 100%; font: inherit; font-size: .9rem;
      padding: .6rem .8rem;
      border: 1.5px solid color-mix(in srgb, var(--color-text) 28%, transparent);
      border-radius: 8px; background: var(--color-surface); color: var(--color-text);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .i-field input:not([type="checkbox"]):not([type="radio"]):focus, .i-field textarea:focus, .i-field select:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 15%, transparent);
    }
    /* =========================================================================
       MØRKT MODUS  — aktiv når #intranet har data-theme="dark"
       ====================================================================== */
    #intranet[data-theme="dark"] {
      --color-bg:        #0f172a;
      --color-surface:   #1e293b;
      --color-text:      #f1f5f9;
      --color-muted:     #94a3b8;
      --color-border:    rgba(241,245,249,.1);
      --color-alt:       rgba(148,163,184,.06);
      --color-tint:      rgba(96,165,250,.12);
      --color-secondary: #a78bfa;
      color-scheme: dark;
    }
    #intranet[data-theme="dark"] .i-field input:not([type="checkbox"]):not([type="radio"]),
    #intranet[data-theme="dark"] .i-field textarea,
    #intranet[data-theme="dark"] .i-field select {
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.05);
    }
    #intranet[data-theme="dark"] .btn--danger:hover { background: rgba(192,57,43,.15); }
    #intranet[data-theme="dark"] .vwu-field input,
    #intranet[data-theme="dark"] .vwu-field select { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.18); }

    [data-theme="dark"] .i-field input:not([type="checkbox"]):not([type="radio"]),
    [data-theme="dark"] .i-field textarea,
    [data-theme="dark"] .i-field select {
      border-color: rgba(255,255,255,.22);
      background: #1e2130;
    }
    .i-field textarea { resize: vertical; min-height: 80px; }
    .form__status { font-size: .85rem; margin: 0; }
    .form__status.is-ok  { color: #2a7a2a; }
    .form__status.is-err { color: #c0392b; }

    /* --- Badge / status --------------------------------------------------- */
    .i-badge {
      display: inline-flex; align-items: center;
      font-size: .72rem; font-weight: 700; padding: .2rem .6rem;
      border-radius: 999px; text-transform: uppercase; letter-spacing: .05em;
    }
    .i-badge--todo      { background: var(--color-alt); color: var(--color-muted); }
    .i-badge--progress  { background: color-mix(in srgb, var(--color-secondary) 15%, transparent); color: var(--color-secondary); }
    .i-badge--done      { background: color-mix(in srgb, #2a7a2a 12%, transparent); color: #2a7a2a; }

    /* --- Drawer ----------------------------------------------------------- */
    .i-drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100;
    }
    .i-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(440px, 100vw);
      background: var(--color-bg);
      border-left: 1px solid var(--color-border);
      z-index: 101; display: flex; flex-direction: column;
      box-shadow: -8px 0 40px rgba(0,0,0,.12);
    }
    .i-drawer__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; border-bottom: 1px solid var(--color-border);
      position: sticky; top: 0; background: var(--color-bg);
    }
    .i-drawer__title { font-size: 1rem; font-weight: 700; }
    .i-drawer__close {
      background: none; border: 0; cursor: pointer;
      font-size: 1.3rem; color: var(--color-muted); line-height: 1;
    }
    .i-drawer__body { padding: 1.2rem; overflow-y: auto; flex: 1; display: grid; gap: .9rem; }
    .i-drawer__foot {
      padding: .9rem 1.2rem; border-top: 1px solid var(--color-border);
      display: flex; gap: .6rem;
    }

    /* --- Grid/seksjonsoverskrift ------------------------------------------ */
    .i-page-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem; gap: 1rem;
    }
    .i-page-head h2 { font-size: 1.3rem; }
    .i-section-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--color-muted); margin: 0 0 .6rem;
    }

    /* --- Mørkt modus ----------------------------------------------------- */
    [data-theme="dark"] {
      --color-bg:      #1e2130;
      --color-surface: #262a3d;
      --color-text:    #dde1f0;
      --color-muted:   #8b91b0;
      --color-border:  rgba(255,255,255,.09);
      --color-alt:     #232638;
      --color-tint:    color-mix(in srgb, var(--color-primary) 18%, #262a3d);
    }
    /* Sikre at alle felt og inputs følger mørk bakgrunn */
    [data-theme="dark"] input,
    [data-theme="dark"] textarea,
    [data-theme="dark"] select {
      background: #1e2130 !important;
      color: #dde1f0 !important;
      border-color: rgba(255,255,255,.12) !important;
    }
    [data-theme="dark"] .i-card {
      background: #262a3d;
      border-color: rgba(255,255,255,.09);
    }
    [data-theme="dark"] .admin-row {
      background: #262a3d;
      border-color: rgba(255,255,255,.09);
    }
    [data-theme="dark"] .i-topbar {
      background: rgba(30,33,48,.95);
      border-color: rgba(255,255,255,.09);
    }
    [data-theme="dark"] .i-sidebar {
      background: #232638;
      border-color: rgba(255,255,255,.09);
    }
    [data-theme="dark"] .i-nav__link:hover { background: rgba(255,255,255,.06); }
    [data-theme="dark"] .i-nav__link.is-active { background: rgba(255,255,255,.1); }
    [data-theme="dark"] .btn--ghost {
      border-color: rgba(255,255,255,.15);
      color: #dde1f0;
    }
    [data-theme="dark"] .btn--ghost:hover { background: rgba(255,255,255,.08); }

    /* --- Mørk modus: generelle overrides for hardkoda fargar i modular --- */
    [data-theme="dark"] .i-form input,
    [data-theme="dark"] .i-form textarea,
    [data-theme="dark"] .i-form select,
    [data-theme="dark"] .i-field input,
    [data-theme="dark"] .i-field textarea,
    [data-theme="dark"] .i-field select,
    [data-theme="dark"] input[type="text"],
    [data-theme="dark"] input[type="email"],
    [data-theme="dark"] input[type="url"],
    [data-theme="dark"] input[type="number"],
    [data-theme="dark"] input[type="search"],
    [data-theme="dark"] input[type="password"],
    [data-theme="dark"] textarea,
    [data-theme="dark"] select {
      background: #1e2130 !important;
      color: #dde1f0 !important;
      border-color: rgba(255,255,255,.18) !important;
    }
    [data-theme="dark"] .admin-row { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .admin-form--card { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .kb-article-row { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .kb-article-view { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .kb-editor { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .od-modal { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .od-card { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .wsp-media-card { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .sb-adm-row { background: #262a3d; border-color: rgba(255,255,255,.08); }
    [data-theme="dark"] [style*="background:var(--color-surface)"] { background: #262a3d !important; }
    [data-theme="dark"] [style*="background: var(--color-surface)"] { background: #262a3d !important; }
    [data-theme="dark"] [style*="color:var(--color-text)"] { color: #dde1f0 !important; }
    [data-theme="dark"] [style*="color: var(--color-text)"] { color: #dde1f0 !important; }
    [data-theme="dark"] [style*="color:var(--color-muted)"] { color: #8b91b0 !important; }
    /* Drawers og modals */
    [data-theme="dark"] .i-drawer { background: #1e2130; border-color: rgba(255,255,255,.1); }
    [data-theme="dark"] .i-drawer__head { border-color: rgba(255,255,255,.1); }
    [data-theme="dark"] .i-drawer__foot { border-color: rgba(255,255,255,.1); }
    /* Nav seksjons-label */
    [data-theme="dark"] .i-nav__section-label { color: #8b91b0; }
    /* Rtfield editor */
    [data-theme="dark"] .rtfield__editor { background: #1e2130; color: #dde1f0; }
    [data-theme="dark"] .rtfield__toolbar { background: #262a3d; }
    /* --- Tetthet ---------------------------------------------------------- */
    [data-density="compact"] { --gap: .7rem; --section-y: 1.2rem; }
    [data-density="compact"] .i-main { padding: 1.2rem 1rem; }
    [data-density="compact"] .i-card { padding: .7rem .85rem; }
    [data-density="compact"] .i-nav__link { padding: .4rem 1rem; }
    [data-density="roomy"]   { --gap: 2rem; }
    [data-density="roomy"]   .i-main { padding: 2.8rem 2.4rem; }
    [data-density="roomy"]   .i-card { padding: 1.6rem 1.8rem; }
    [data-density="roomy"]   .i-nav__link { padding: .85rem 1rem; }

    /* --- Rik-tekst-felt (rtfield frå components.js) ----------------------- */
    .rtfield { display: grid; gap: .35rem; }
    .rtfield label { font-size: .85rem; font-weight: 600; }
    .rtfield__toolbar {
      display: flex; gap: .25rem; flex-wrap: wrap;
      background: var(--color-alt);
      border: 1.5px solid color-mix(in srgb,var(--color-text) 28%,transparent);
      border-bottom: 0; border-radius: 8px 8px 0 0; padding: .35rem .5rem;
    }
    .rtfield__toolbar button, .rtfield__toolbar label {
      background: none; border: 1px solid transparent; border-radius: 5px;
      cursor: pointer; padding: .25rem .45rem; font: inherit; font-size: .85rem;
      color: var(--color-text); line-height: 1.2; display:inline-flex; align-items:center;
    }
    .rtfield__toolbar button:hover, .rtfield__toolbar label:hover {
      background: var(--color-surface); border-color: var(--color-border);
    }
    .rtfield__toolbar input[type="color"] { width:1.4rem;height:1.4rem;border:0;padding:0;cursor:pointer;background:none; }
    .rtfield__sep { width:1px;background:var(--color-border);margin:.2rem .15rem;align-self:stretch;display:inline-block; }
    .rtfield__editor {
      min-height: 160px;
      border: 1.5px solid color-mix(in srgb,var(--color-text) 28%,transparent);
      border-radius: 0 0 8px 8px; padding: .7rem .85rem;
      background: var(--color-surface); color: var(--color-text);
      line-height: 1.7; outline: none; font-size: .92rem;
    }
    .rtfield__editor:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }
    .rtfield__editor ul, .rtfield__editor ol { padding-left: 1.4rem; }
    .rtfield__editor a { color: var(--color-primary); }
    [data-theme="dark"] .rtfield__editor,
    [data-theme="dark"] .rtfield__toolbar { border-color: rgba(255,255,255,.22); }

    /* --- Bildemodal (mediebank) ------------------------------------------- */
    .wsp-img-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      cursor: pointer;
    }
    .wsp-img-modal {
      max-width: min(900px,95vw); max-height: 90vh;
      background: var(--color-surface); border-radius: var(--radius);
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,.5); cursor: default;
    }
    .wsp-img-modal__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 1rem; border-bottom: 1px solid var(--color-border); flex-shrink: 0;
    }
    .wsp-img-modal__img { max-width: 100%; max-height: 68vh; object-fit: contain; display: block; margin: auto; }

    /* --- Mobil ------------------------------------------------------------ */
    .i-hamburger {
      display: none;
      background: none; border: 0; cursor: pointer;
      font-size: 1.4rem; color: var(--color-text); line-height: 1;
      padding: .3rem;
    }
    .i-sidebar-overlay {
      display: none;
      position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 40;
    }
    @media (max-width: 700px) {
      .i-hamburger { display: flex; align-items: center; }
      .i-sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        z-index: 50; transform: translateX(-100%);
        transition: transform .22s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,.18);
      }
      .i-sidebar.is-open { transform: translateX(0); }
      .i-sidebar.is-open ~ .i-sidebar-overlay,
      .i-sidebar-overlay.is-open { display: block; }
      .i-body { width: 100%; }
      .i-topbar { padding: 0 .9rem; gap: .6rem; }
      .i-main { padding: 1.2rem .9rem; }
    }
  </style>
</head>
<body>
  <!-- Intranett-rot. IKKE #app — core.js sin buildShell() leter etter #app og no-op-er her. -->
  <div id="intranet"></div>

  <!-- =======================================================================
       INNLASTING
       Samme rekkefølge som rot-siden. core.js auto-booter, men tegner ingenting
       (ingen #app / #main i DOM). Vi gjenbruker App.store, App.media og
       window.Components — ikke motoren/routeren/registeret.
       Intranettet har sitt eget register og router i intranet-core.js.
       Alle intranett-ruter bruker #/-prefiks slik at de aldri matcher
       core.js sin route()-funksjon.
       ==================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../config.js?v=7"></script>
  <script src="../components.js?v=5"></script>
  <script src="../core.js?v=21"></script>
