<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">

<title>Spaceship</title>
<style>
:root{--space-0:#061528;--space-1:#101827;--space-2:#1e1b4b;--cyan:#7dd3fc;--ink:#e5e7eb;--muted:#94a3b8;--line:rgba(125,211,252,.22);--hud:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono","Roboto Mono",monospace;--sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{height:100%;margin:0;overscroll-behavior:none;overflow:hidden;touch-action:none;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--ink);background:linear-gradient(180deg,var(--space-0),var(--space-1) 55%,var(--space-2));min-height:100dvh;display:flex;flex-direction:column}
.bar{height:64px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:.6rem;padding:.65rem max(.75rem,env(safe-area-inset-left)) .65rem max(.75rem,env(safe-area-inset-left));border-bottom:1px solid var(--line);background:rgba(6,21,40,.92)}
.left{display:flex;align-items:center;gap:.75rem;min-width:0}.wordmark{font-family:var(--hud);font-weight:700;letter-spacing:.24em;text-transform:uppercase;white-space:nowrap}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 4px #fff;margin-right:.55rem}.mode{display:flex;gap:.35rem}.ctl,.mode button{appearance:none;cursor:pointer;font-family:var(--hud);font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);background:rgba(125,211,252,.08);border:1px solid var(--line);border-radius:999px;padding:.48rem .68rem;display:inline-flex;align-items:center;gap:.35rem}.mode button[aria-pressed="true"]{background:rgba(125,211,252,.22);border-color:rgba(125,211,252,.7);color:#fff}.controls{display:flex;gap:.4rem}.ctl svg{width:15px;height:15px}@media(max-width:640px){.bar{height:56px}.wordmark{font-size:.78rem;letter-spacing:.16em}.mode button,.ctl{font-size:.64rem;padding:.45rem .52rem}.ctl .label{display:none}}
#stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:.6rem;touch-action:none}.game-shell{height:100%;width:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:.45rem;align-items:center;justify-items:center}.scorebar{width:min(100%,920px);display:flex;justify-content:space-between;gap:.75rem;font-family:var(--hud);font-size:.8rem;color:var(--muted);padding:0 .15rem}.scorebar b{color:var(--cyan)}.canvas-wrap{position:relative;max-width:100%;max-height:100%;border:1px solid var(--line);border-radius:14px;background:#07111f;overflow:hidden;box-shadow:0 18px 60px rgba(2,8,20,.55),inset 0 0 60px rgba(125,211,252,.05)}canvas{display:block;width:100%;height:100%;touch-action:none;cursor:pointer}.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.35);color:white;gap:.35rem;pointer-events:none;padding:1rem}.overlay.is-hidden{display:none}.overlay strong{font-size:clamp(1.45rem,5vw,2.2rem)}.overlay span{font-size:clamp(.9rem,3vw,1.05rem);opacity:.92}.hint{font-family:var(--hud);font-size:.75rem;color:var(--muted);text-align:center;min-height:1em}.toast{position:fixed;left:50%;bottom:1rem;transform:translateX(-50%) translateY(16px);background:rgba(6,21,40,.95);border:1px solid var(--line);color:var(--ink);font-family:var(--hud);font-size:.78rem;padding:.55rem .9rem;border-radius:999px;z-index:60;opacity:0;transition:.18s;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Avgrenset beskyttelse mot mobilens tekstmarkering/menyer i selve spillflaten. */
#stage,.game-shell,.canvas-wrap,canvas{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none!important;user-select:none!important;-webkit-user-drag:none}
canvas{-ms-touch-action:none}
/* Fullskjerm: behold avslutt-knappen i en egen stripe utenfor spillflaten. */
body.immersive .bar{display:flex;position:fixed;inset:0 0 auto 0;height:56px;z-index:30;justify-content:flex-end;padding:calc(.45rem + env(safe-area-inset-top)) max(.55rem,env(safe-area-inset-right)) .45rem max(.55rem,env(safe-area-inset-left));border-bottom:1px solid rgba(125,211,252,.16);background:rgba(6,21,40,.94)}
body.immersive .bar .left,body.immersive #shareBtn{display:none}
body.immersive .controls{display:flex}
body.immersive .ctl{min-width:42px;min-height:38px;justify-content:center;background:rgba(125,211,252,.13);border-color:rgba(125,211,252,.45)}
body.immersive .ctl .label{display:inline}
body.immersive #stage{position:fixed;inset:56px 0 0 0;padding:max(.45rem,env(safe-area-inset-top)) max(.45rem,env(safe-area-inset-right)) max(.45rem,env(safe-area-inset-bottom)) max(.45rem,env(safe-area-inset-left));z-index:10;background:linear-gradient(180deg,var(--space-0),var(--space-1) 55%,var(--space-2))}
.fullscreen-score{display:none}
body.immersive .fullscreen-score{display:flex;position:fixed;left:max(.55rem,env(safe-area-inset-left));top:0;z-index:50;height:56px;align-items:center;gap:.8rem;padding:0 .38rem;font-family:var(--hud);font-size:.82rem;font-weight:800;letter-spacing:.01em;color:#f8fafc;text-shadow:0 1px 2px rgba(0,0,0,.95);pointer-events:none}
body.immersive .fullscreen-score b{color:var(--cyan);font-size:.98rem}
@media(max-width:640px){body.immersive .ctl .label{display:none}}
/* Telefon i liggende format: bruk nesten all tilgjengelig høyde, uten å endre PC-layouten. */
@media (pointer:coarse) and (orientation:landscape) and (max-height:540px){
  .bar{height:46px;padding:.25rem max(.45rem,env(safe-area-inset-right)) .25rem max(.45rem,env(safe-area-inset-left));gap:.35rem}
  .left{gap:.4rem}
  .wordmark{font-size:.72rem;letter-spacing:.13em}
  .dot{width:7px;height:7px;margin-right:.35rem}
  .mode{gap:.24rem}
  .mode button,.ctl{font-size:.61rem;padding:.34rem .46rem;min-height:32px}
  #stage{padding:3px}
  .game-shell{grid-template-rows:auto minmax(0,1fr);gap:3px}
  .scorebar{width:100%;min-height:17px;align-items:center;padding:0 .2rem;font-size:.7rem;line-height:1}
  .hint{display:none}
  .canvas-wrap{border-radius:7px;box-shadow:none}
  body.immersive .bar{height:44px;padding:calc(.18rem + env(safe-area-inset-top)) max(.45rem,env(safe-area-inset-right)) .18rem max(.45rem,env(safe-area-inset-left))}
  body.immersive #stage{inset:44px 0 0 0;padding:2px max(2px,env(safe-area-inset-right)) max(2px,env(safe-area-inset-bottom)) max(2px,env(safe-area-inset-left))}
  body.immersive .game-shell{display:flex;position:relative;align-items:center;justify-content:center;width:100%;height:100%}
  /* Den vanlige scorelinjen blir liggende bak toppbaren på iOS.
     Fullskjerm-HUD-en er en søster av toppbaren og ligger derfor alltid over den. */
  body.immersive .scorebar{display:none}
  body.immersive .fullscreen-score{height:44px;font-size:.78rem;gap:.78rem;color:#fff}
  body.immersive .fullscreen-score b{font-size:1rem;color:var(--cyan)}
  body.immersive .canvas-wrap{border-radius:4px;box-shadow:none;flex:0 0 auto;margin:auto}
}
</style>
</head>
<body>
<header class="bar">
  <div class="left"><div class="wordmark"><span class="dot"></span>Spaceship</div><div class="mode" aria-label="Velg spillmodus"><button id="modeClassic" type="button">Vanlig</button><button id="modePortrait" type="button">Stående</button></div></div>
  <div class="controls"><button class="ctl" id="shareBtn" type="button" aria-label="Del">Del</button><button class="ctl" id="fsBtn" type="button" aria-label="Fullskjerm" aria-pressed="false"><svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg><span class="label" id="fsLabel">Fullskjerm</span></button></div>
</header>
<div class="fullscreen-score" id="fullscreenScore" aria-live="polite"><span>Poeng: <b id="fsScoreEl">0</b></span><span>Beste: <b id="fsBestEl">0</b></span></div>
<main id="stage"><div class="game-shell"><div class="scorebar"><span>Poeng: <b id="scoreEl">0</b></span><span>Beste: <b id="bestEl">0</b></span></div><div class="canvas-wrap" id="wrap"><canvas id="game"></canvas><div class="overlay" id="overlay"><strong id="ovTitle">Spaceship</strong><span id="ovText">Velg modus og start</span></div></div><div class="hint" id="hint"></div></div></main>
<div class="toast" id="toast"></div>
<script>
(function(){"use strict";
var STORE="wsp-spaceship-modes-v1";
var body=document.body,stage=document.getElementById("stage"),canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),wrap=document.getElementById("wrap"),overlay=document.getElementById("overlay"),ovTitle=document.getElementById("ovTitle"),ovText=document.getElementById("ovText"),scoreEl=document.getElementById("scoreEl"),bestEl=document.getElementById("bestEl"),fsScoreEl=document.getElementById("fsScoreEl"),fsBestEl=document.getElementById("fsBestEl"),hint=document.getElementById("hint"),modeClassic=document.getElementById("modeClassic"),modePortrait=document.getElementById("modePortrait"),fsBtn=document.getElementById("fsBtn"),fsLabel=document.getElementById("fsLabel"),fsIcon=document.getElementById("fsIcon"),shareBtn=document.getElementById("shareBtn"),toastEl=document.getElementById("toast");
var mode=load().mode||"classic",W=720,H=420,ship,obstacles=[],stars=[],particles=[],score=0,best=0,running=false,dead=false,frame=0,thrusting=false,lastInput=0,nextAt=70,pointerDown=false,targetX=210,keys={left:false,right:false};
function load(){try{return JSON.parse(localStorage.getItem(STORE)||"{}")}catch(e){return {}}}function save(v){try{localStorage.setItem(STORE,JSON.stringify(Object.assign(load(),v)))}catch(e){}}
function modeKey(){return mode==="portrait"?"bestPortrait":"bestClassic"}function getBest(){return load()[modeKey()]||0}function setBest(v){var o={};o[modeKey()]=v;save(o)}
function showScore(v){scoreEl.textContent=String(v);fsScoreEl.textContent=String(v)}
function showBest(v){bestEl.textContent=String(v);fsBestEl.textContent=String(v)}
function setMode(m){mode=m;save({mode:m});modeClassic.setAttribute("aria-pressed",m==="classic");modePortrait.setAttribute("aria-pressed",m==="portrait");reset(true);fit();}
function reset(wait){W=mode==="portrait"?420:720;H=mode==="portrait"?720:420;canvas.width=W;canvas.height=H;ship=mode==="portrait"?{x:W/2,y:H-88,vy:0,r:15,rot:0}:{x:120,y:H/2,vy:0,r:15,rot:0};targetX=ship.x;obstacles=[];particles=[];stars=makeStars();score=0;frame=0;running=!wait;dead=false;thrusting=false;nextAt=mode==="portrait"?38:70;best=getBest();showScore(0);showBest(best);overlay.classList.toggle("is-hidden",!wait);ovTitle.textContent=mode==="portrait"?"Stående modus":"Spaceship";ovText.textContent=mode==="portrait"?"Swipe sidelengs for å starte":"Hold inne for thrust";hint.textContent=mode==="portrait"?"Mobil: swipe/drag sidelengs. PC: piltaster eller mus.":"Mobil/PC: hold inne for thrust. Space fungerer på PC.";}
function compactLandscape(){
  if(window.matchMedia){return window.matchMedia("(pointer: coarse) and (orientation: landscape) and (max-height: 540px)").matches}
  return window.innerWidth>window.innerHeight&&Math.min(window.innerWidth,window.innerHeight)<=540
}
function fit(){
  var shell=wrap.parentElement;
  var vw=shell.clientWidth;
  var vh=shell.clientHeight;
  /* I vanlig mobil-landscape ligger scorelinjen over canvas-raden. I fullskjerm
     flyttes den til toppstripen, slik at canvas kan bruke hele resten av høyden. */
  if(compactLandscape()&&!body.classList.contains("immersive")){
    var gap=parseFloat(window.getComputedStyle(shell).rowGap)||0;
    vh-=scoreEl.parentElement.offsetHeight+gap;
  }
  var ratio=W/H;
  var w=Math.min(vw,vh*ratio);
  var h=w/ratio;
  if(h>vh){h=vh;w=h*ratio}
  wrap.style.width=Math.max(1,Math.floor(w))+"px";
  wrap.style.height=Math.max(1,Math.floor(h))+"px";
}
function makeStars(){var a=[];for(var i=0;i<110;i++)a.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+.4,v:Math.random()*.8+.2,a:Math.random()*.5+.35});return a}
function begin(){if(dead){reset(false);return}if(!running){running=true;overlay.classList.add("is-hidden")}if(mode==="classic"){var now=Date.now();thrusting=true;if(now-lastInput>140){ship.vy=Math.min(ship.vy,-2.45);addThrust()}lastInput=now}}
function end(){thrusting=false;pointerDown=false}
function pos(e){var r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
function clearSelection(){
  var sel=window.getSelection&&window.getSelection();
  if(sel&&sel.removeAllRanges)sel.removeAllRanges();
}
function isGameArea(target){return !!(target&&stage&&stage.contains(target))}
function stopGameBrowserAction(e){
  if(e.cancelable)e.preventDefault();
  clearSelection();
}
/* Hele spillflaten, også lufta rundt lerretet, fungerer som kontrollområde.
   Dette gjør at trykk i sidemargene i mobil-landscape fortsatt starter/holder spillet. */
function stagePos(e){
  var r=canvas.getBoundingClientRect();
  var x=(e.clientX-r.left)*W/r.width;
  return {x:Math.max(0,Math.min(W,x)),y:0};
}
function stagePointerDown(e){
  if(e.target&&e.target.closest&&e.target.closest("button,a,input,select,textarea"))return;
  stopGameBrowserAction(e);
  pointerDown=true;
  stage.setPointerCapture&&stage.setPointerCapture(e.pointerId);
  var p=stagePos(e);
  if(mode==="portrait"){targetX=p.x;begin()}else begin();
}
function stagePointerMove(e){
  if(!pointerDown)return;
  stopGameBrowserAction(e);
  if(mode==="portrait"){targetX=stagePos(e).x;begin()}
}
function stagePointerUp(e){stopGameBrowserAction(e);end()}
stage.addEventListener("pointerdown",stagePointerDown,{passive:false});
stage.addEventListener("pointermove",stagePointerMove,{passive:false});
stage.addEventListener("pointerup",stagePointerUp,{passive:false});
stage.addEventListener("pointercancel",end);
stage.addEventListener("lostpointercapture",end);
stage.addEventListener("pointerleave",function(){if(mode==="classic")end()});
window.addEventListener("pointerup",end,{passive:true});
window.addEventListener("pointercancel",end,{passive:true});
window.addEventListener("blur",end);
document.addEventListener("visibilitychange",function(){if(document.hidden)end()});
document.addEventListener("keydown",function(e){if(e.code==="Space"&&mode==="classic"){e.preventDefault();begin()}if(e.code==="ArrowLeft"){e.preventDefault();keys.left=true;begin()}if(e.code==="ArrowRight"){e.preventDefault();keys.right=true;begin()}if(e.key==="Escape"&&body.classList.contains("immersive"))leaveFs()});
document.addEventListener("keyup",function(e){if(e.code==="Space"){e.preventDefault();end()}if(e.code==="ArrowLeft")keys.left=false;if(e.code==="ArrowRight")keys.right=false});
["contextmenu","selectstart","dragstart"].forEach(function(n){
  document.addEventListener(n,function(e){if(isGameArea(e.target))stopGameBrowserAction(e)},{passive:false});
});
["gesturestart","gesturechange","gestureend"].forEach(function(n){
  document.addEventListener(n,function(e){if(isGameArea(e.target))stopGameBrowserAction(e)},{passive:false});
});
document.addEventListener("touchstart",function(e){if(isGameArea(e.target))clearSelection()},{passive:false});
document.addEventListener("touchmove",function(e){
  /* Spillet eier alle swipes i sceneområdet, men toppknappene beholder vanlige trykk. */
  if(isGameArea(e.target))stopGameBrowserAction(e);
},{passive:false});
function addThrust(){for(var i=0;i<7;i++)particles.push({x:ship.x-23,y:ship.y+(Math.random()*10-5),vx:-1.5-Math.random()*2.4,vy:Math.random()*1.8-.9,life:18+Math.random()*8,size:2+Math.random()*3})}
function availableLanes(count, used){var out=[];for(var i=0;i<count;i++)if(!used[i])out.push(i);return out}
function takeLane(count, used){var lanes=availableLanes(count,used);if(!lanes.length)return null;var lane=lanes[Math.floor(Math.random()*lanes.length)];used[lane]=true;return lane}
function spawnClassic(){
  var laneCount=5,laneH=H/laneCount,safe=Math.floor(Math.random()*laneCount),used={};
  used[safe]=true;
  if(safe>0&&Math.random()<.55)used[safe-1]=true;
  if(safe<laneCount-1&&Math.random()<.55)used[safe+1]=true;
  /* Keep the same total obstacle budget as before. Comets start early,
     but replace one planet rather than being added as an extra hazard. */
  var hazardBudget=score<8 ? 2 : 1+Math.floor(Math.random()*(2+Math.min(1,Math.floor((score-8)/12))));
  var hasComet=Math.random()<Math.min(.46,.24+score*.007);
  var planetAmount=hazardBudget-(hasComet?1:0);
  for(var i=0;i<planetAmount;i++){
    var lane=takeLane(laneCount,used); if(lane===null)break;
    var y=lane*laneH+24+Math.random()*(laneH-48);
    obstacles.push({type:"planet",x:W+70+Math.random()*150,y:y,r:10+Math.random()*11,vr:-.022+Math.random()*.044,rot:Math.random()*Math.PI,color:randColor(),passed:false});
  }
  if(hasComet){
    var cometLane=takeLane(laneCount,used);
    if(cometLane!==null){
      var cometY=cometLane*laneH+26+Math.random()*(laneH-52);
      obstacles.push({type:"comet",x:W+145+Math.random()*115,y:cometY,r:12+Math.random()*9,vr:-.018+Math.random()*.036,rot:Math.random()*Math.PI,color:"#cbd5e1",passed:false});
    }
  }
  /* Same gradual tempo increase as the original. */
  nextAt=frame+Math.max(62,94-Math.min(score,30)*.85)
}
function spawnPortrait(){
  var cols=5,colW=W/cols,safe=Math.floor(Math.random()*cols),used={}; used[safe]=true;
  if(safe>0&&Math.random()<.45)used[safe-1]=true;
  if(safe<cols-1&&Math.random()<.45)used[safe+1]=true;
  /* Same difficulty budget in portrait: early comets replace a planet,
     while the total number of hazards still scales with score. */
  var hazardBudget=score<8 ? 2 : 1+Math.floor(Math.random()*(2+Math.min(1,Math.floor((score-8)/12))));
  var hasComet=Math.random()<Math.min(.46,.24+score*.007);
  var planetAmount=hazardBudget-(hasComet?1:0);
  for(var i=0;i<planetAmount;i++){
    var col=takeLane(cols,used); if(col===null)break;
    obstacles.push({type:"planet",x:col*colW+colW*.25+Math.random()*colW*.5,y:-45-Math.random()*85,r:11+Math.random()*12,vr:-.022+Math.random()*.044,rot:Math.random()*Math.PI,color:randColor(),passed:false});
  }
  if(hasComet){
    var cometCol=takeLane(cols,used);
    if(cometCol!==null)obstacles.push({type:"comet",x:cometCol*colW+colW*.25+Math.random()*colW*.5,y:-150-Math.random()*75,r:12+Math.random()*9,vr:-.018+Math.random()*.036,rot:Math.random()*Math.PI,color:"#cbd5e1",passed:false});
  }
  /* Keep the gradual portrait tempo increase. */
  nextAt=frame+Math.max(42,68-Math.min(score,35)*.6)
}
function randColor(){var c=["#8b5cf6","#22c55e","#06b6d4","#f97316","#ec4899","#64748b","#f59e0b"];return c[Math.floor(Math.random()*c.length)]}
function update(){frame++;stars.forEach(function(s){if(mode==="portrait"){s.y+=s.v;if(s.y>H){s.y=0;s.x=Math.random()*W}}else{s.x-=s.v;if(s.x<0){s.x=W;s.y=Math.random()*H}}});particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=.97});particles=particles.filter(function(p){return p.life>0});if(!running||dead)return;if(mode==="classic")updateClassic();else updatePortrait()}
function updateClassic(){ship.vy=Math.min(6.1,ship.vy+.235);if(thrusting){ship.vy+=-.34;ship.vy=Math.max(ship.vy,-4.9);if(frame%3===0)addThrust()}ship.y+=ship.vy;ship.rot=Math.max(-.45,Math.min(.74,ship.vy/11));if(frame>=nextAt)spawnClassic();obstacles.forEach(function(o){o.x-=2.55+Math.min(score*.010,.34)+(o.type==="comet"?.48:0);o.rot+=o.vr;if(!o.passed&&o.x+o.r<ship.x){o.passed=true;score++;showScore(score)}if(hit(ship.x,ship.y,ship.r,o.x,o.y,o.r-1.5))gameOver()});obstacles=obstacles.filter(function(o){return o.x>-70});if(ship.y<-20||ship.y>H+20)gameOver()}
function updatePortrait(){if(keys.left)targetX-=8;if(keys.right)targetX+=8;targetX=Math.max(28,Math.min(W-28,targetX));ship.x+=(targetX-ship.x)*.22;ship.rot=(targetX-ship.x)/80;if(frame%5===0)particles.push({x:ship.x+(Math.random()*10-5),y:ship.y+20,vx:Math.random()*1.2-.6,vy:1+Math.random()*2,life:18,size:2+Math.random()*3});if(frame>=nextAt)spawnPortrait();obstacles.forEach(function(o){o.y+=3.0+Math.min(score*.018,.72)+(o.type==="comet"?.65:0);o.rot+=o.vr;if(!o.passed&&o.y-o.r>ship.y){o.passed=true;score++;showScore(score)}if(hit(ship.x,ship.y,ship.r,o.x,o.y,o.r-1.5))gameOver()});obstacles=obstacles.filter(function(o){return o.y<H+80})}
function hit(x1,y1,r1,x2,y2,r2){var dx=x1-x2,dy=y1-y2,rr=r1+r2;return dx*dx+dy*dy<rr*rr}
function gameOver(){if(dead)return;dead=true;running=false;if(score>best){best=score;setBest(best);showBest(best)}ovTitle.textContent="Game over";ovText.textContent="Poeng: "+score+" — trykk for ny runde";overlay.classList.remove("is-hidden")}
function draw(){ctx.clearRect(0,0,W,H);drawBg();drawStars();drawParticles();obstacles.forEach(drawObstacle);drawShip();requestAnimationFrame(loop)}
function drawBg(){var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#061528");g.addColorStop(.55,"#101827");g.addColorStop(1,"#1e1b4b");ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}function drawStars(){stars.forEach(function(s){ctx.fillStyle="rgba(255,255,255,"+s.a+")";ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill()})}function drawParticles(){particles.forEach(function(p){ctx.save();ctx.globalAlpha=Math.max(0,p.life/26);ctx.fillStyle=p.life%2>1?"#f97316":"#facc15";ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore()})}
function drawObstacle(o){if(o.type==="comet")drawComet(o);else drawPlanet(o)}
function drawPlanet(o){
  var grad=ctx.createRadialGradient(o.x-o.r*.25,o.y-o.r*.25,o.r*.08,o.x,o.y,o.r);
  grad.addColorStop(0,"#fff");grad.addColorStop(.25,o.color);grad.addColorStop(1,"#111827");
  ctx.save();ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
  ctx.globalAlpha=.22;ctx.strokeStyle="#fff";ctx.lineWidth=Math.max(2,o.r*.14);ctx.beginPath();ctx.ellipse(o.x,o.y,o.r*1.12,o.r*.32,-.25,0,Math.PI*2);ctx.stroke();ctx.restore()
}
function drawComet(o){
  ctx.save();
  var vertical=mode==="portrait";
  var glow=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*2.5);glow.addColorStop(0,"rgba(255,255,255,.3)");glow.addColorStop(.45,"rgba(125,211,252,.18)");glow.addColorStop(1,"rgba(125,211,252,0)");ctx.fillStyle=glow;ctx.beginPath();ctx.arc(o.x,o.y,o.r*2.5,0,Math.PI*2);ctx.fill();
  var tail=vertical?ctx.createLinearGradient(o.x,o.y-o.r*5.5,o.x,o.y):ctx.createLinearGradient(o.x+o.r*5.5,o.y,o.x,o.y);
  tail.addColorStop(0,"rgba(125,211,252,0)");tail.addColorStop(.58,"rgba(125,211,252,.24)");tail.addColorStop(1,"rgba(255,255,255,.68)");ctx.fillStyle=tail;ctx.beginPath();
  if(vertical){ctx.moveTo(o.x-o.r*.72,o.y-o.r*5.5);ctx.lineTo(o.x,o.y-o.r*4.2);ctx.lineTo(o.x+o.r*.72,o.y-o.r*5.5);ctx.lineTo(o.x+o.r*.28,o.y+o.r*.15);ctx.lineTo(o.x-o.r*.28,o.y+o.r*.15)}
  else{ctx.moveTo(o.x+o.r*5.5,o.y-o.r*.72);ctx.lineTo(o.x+o.r*4.2,o.y);ctx.lineTo(o.x+o.r*5.5,o.y+o.r*.72);ctx.lineTo(o.x-o.r*.15,o.y+o.r*.28);ctx.lineTo(o.x-o.r*.15,o.y-o.r*.28)}
  ctx.closePath();ctx.fill();
  ctx.translate(o.x,o.y);ctx.rotate(o.rot);
  var body=ctx.createRadialGradient(-o.r*.35,-o.r*.35,o.r*.1,0,0,o.r*1.15);body.addColorStop(0,"#f8fafc");body.addColorStop(.35,"#cbd5e1");body.addColorStop(1,"#64748b");ctx.fillStyle=body;ctx.beginPath();ctx.moveTo(o.r,-o.r*.12);ctx.lineTo(o.r*.55,o.r*.72);ctx.lineTo(-o.r*.25,o.r*.95);ctx.lineTo(-o.r*.95,o.r*.28);ctx.lineTo(-o.r*.7,-o.r*.62);ctx.lineTo(o.r*.25,-o.r*.92);ctx.closePath();ctx.fill();ctx.strokeStyle="rgba(255,255,255,.35)";ctx.lineWidth=1.1;ctx.stroke();ctx.restore()
}
function drawShip(){ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.rot);if(mode==="classic"&&running&&(thrusting||ship.vy<1)){var f=ctx.createLinearGradient(-18,0,-38,0);f.addColorStop(0,"#facc15");f.addColorStop(1,"#ef4444");ctx.fillStyle=f;ctx.beginPath();ctx.moveTo(-15,-7);ctx.lineTo(-37-Math.random()*6,0);ctx.lineTo(-15,7);ctx.closePath();ctx.fill()}if(mode==="portrait"){ctx.rotate(-Math.PI/2);}
ctx.fillStyle="#ef4444";ctx.beginPath();ctx.moveTo(-6,9);ctx.lineTo(-19,20);ctx.lineTo(-14,4);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(-6,-9);ctx.lineTo(-19,-20);ctx.lineTo(-14,-4);ctx.closePath();ctx.fill();var b=ctx.createLinearGradient(-18,0,22,0);b.addColorStop(0,"#cbd5e1");b.addColorStop(.45,"#fff");b.addColorStop(1,"#e5e7eb");ctx.fillStyle=b;ctx.beginPath();ctx.moveTo(25,0);ctx.bezierCurveTo(15,-18,-9,-16,-21,-8);ctx.bezierCurveTo(-16,-3,-16,3,-21,8);ctx.bezierCurveTo(-9,16,15,18,25,0);ctx.closePath();ctx.fill();ctx.strokeStyle="rgba(15,23,42,.25)";ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle="#ef4444";ctx.beginPath();ctx.moveTo(25,0);ctx.bezierCurveTo(19,-8,15,-10,11,-11);ctx.bezierCurveTo(14,-4,14,4,11,11);ctx.bezierCurveTo(15,10,19,8,25,0);ctx.fill();ctx.fillStyle="#38bdf8";ctx.beginPath();ctx.arc(2,-2,5.8,0,Math.PI*2);ctx.fill();ctx.restore()}
function loop(){update();draw()}
function setFsIcon(on){
  if(!fsIcon)return;
  fsIcon.innerHTML=on
    ? '<path d="M9 3v6H3M15 3v6h6M21 15h-6v6M3 15h6v6"/>'
    : '<path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/>';
}
function enterFs(){body.classList.add("immersive");var r=document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen;if(r){try{var p=r.call(document.documentElement);if(p&&p.catch)p.catch(function(){})}catch(e){}}syncFs()}
function leaveFs(){body.classList.remove("immersive");if(document.fullscreenElement||document.webkitFullscreenElement){var e=document.exitFullscreen||document.webkitExitFullscreen;if(e){try{e.call(document)}catch(x){}}}syncFs()}
function syncFs(){var on=body.classList.contains("immersive");fsBtn.setAttribute("aria-pressed",on?"true":"false");fsBtn.setAttribute("aria-label",on?"Avslutt fullskjerm":"Fullskjerm");fsLabel.textContent=on?"Avslutt":"Fullskjerm";setFsIcon(on);setTimeout(fit,60)}
fsBtn.addEventListener("click",function(){body.classList.contains("immersive")?leaveFs():enterFs()});
function onFsChange(){if(!document.fullscreenElement&&!document.webkitFullscreenElement&&body.classList.contains("immersive"))body.classList.remove("immersive");syncFs()}
document.addEventListener("fullscreenchange",onFsChange);document.addEventListener("webkitfullscreenchange",onFsChange);
function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(function(){toastEl.classList.remove("show")},2000)}shareBtn.addEventListener("click",function(){var url=location.href;if(navigator.share){navigator.share({title:"Spaceship",text:"Klarer du å slå rekorden?",url:url}).catch(function(){})}else if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){toast("Lenke kopiert")}).catch(function(){toast(url)})}else toast(url)});
modeClassic.addEventListener("click",function(){setMode("classic")});modePortrait.addEventListener("click",function(){setMode("portrait")});window.addEventListener("resize",fit);window.addEventListener("orientationchange",function(){setTimeout(fit,160)});if(window.visualViewport)window.visualViewport.addEventListener("resize",fit);
setMode(mode);requestAnimationFrame(loop);
})();
</script>
