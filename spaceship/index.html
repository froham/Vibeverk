<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#061528">
<title>Spaceship</title>
<style>
  /* ---- Palett hentet rett fra spillet (bakgrunn, kometglød, thrust, skip) ---- */
  :root{
    --space-0:#061528;
    --space-1:#101827;
    --space-2:#1e1b4b;
    --cyan:#7dd3fc;
    --amber:#f97316;
    --gold:#facc15;
    --ship:#ef4444;
    --ink:#e5e7eb;
    --muted:#94a3b8;
    --line:rgba(125,211,252,.22);
    /* tokens spillmodulen forventer */
    --color-muted:var(--muted);
    --color-border:var(--line);
    --color-surface:rgba(255,255,255,.04);
    --radius:16px;
    --hud:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono","Roboto Mono",monospace;
    --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overscroll-behavior:none}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(900px 600px at 78% 12%, rgba(125,211,252,.10), transparent 60%),
      linear-gradient(180deg,var(--space-0) 0%,var(--space-1) 55%,var(--space-2) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---- Toppbar (utenfor spillet) ---- */
  .bar{
    display:flex;align-items:center;justify-content:space-between;
    gap:.75rem;padding:.85rem clamp(.9rem,3vw,1.6rem);
    border-bottom:1px solid var(--line);
  }
  .wordmark{
    font-family:var(--hud);
    font-weight:700;letter-spacing:.32em;
    font-size:clamp(.95rem,3.4vw,1.15rem);
    text-transform:uppercase;
    color:var(--ink);
    display:flex;align-items:center;gap:.6rem;
  }
  .wordmark .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 12px var(--cyan),0 0 4px #fff;
  }
  .controls{display:flex;gap:.5rem}
  .ctl{
    appearance:none;cursor:pointer;
    font-family:var(--hud);font-size:.74rem;letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink);
    background:rgba(125,211,252,.08);
    border:1px solid var(--line);
    border-radius:999px;
    padding:.5rem .8rem;
    display:inline-flex;align-items:center;gap:.4rem;
    transition:background .15s ease,border-color .15s ease,transform .05s ease;
  }
  .ctl:hover{background:rgba(125,211,252,.16);border-color:rgba(125,211,252,.5)}
  .ctl:active{transform:translateY(1px)}
  .ctl:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .ctl svg{width:15px;height:15px;display:block}
  .ctl .label{display:inline}
  @media (max-width:480px){ .ctl .label{display:none} .ctl{padding:.55rem} }

  /* ---- Scene ---- */
  #stage{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    padding:clamp(.8rem,3vw,2rem);
    touch-action:none;
  }

  /* ---- Signatur: glødende cockpit-ramme med hjørnemerker rundt lerretet ---- */
  #stage .ws-canvas-wrap{
    position:relative;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 60px rgba(2,8,20,.6),inset 0 0 60px rgba(125,211,252,.05);
    background:#07111f;
    margin:0 auto;
  }
  #stage .ws-canvas-wrap::before,
  #stage .ws-canvas-wrap::after{
    content:"";position:absolute;width:18px;height:18px;pointer-events:none;
    border:2px solid var(--cyan);opacity:.65;
  }
  #stage .ws-canvas-wrap::before{top:-1px;left:-1px;border-right:0;border-bottom:0;border-top-left-radius:14px}
  #stage .ws-canvas-wrap::after{bottom:-1px;right:-1px;border-left:0;border-top:0;border-bottom-right-radius:14px}

  /* ---- Restyle av spillmodulens egen "chrome" (id-scope vinner over modulens klasser) ---- */
  #stage .ws-game{max-width:920px;width:100%}
  #stage .ws-game__head{align-items:center}
  #stage .ws-game__head > div:not(.ws-game__score){display:none}   /* skjul modulens egen tittel/eyebrow – vi har wordmark */
  #stage .ws-game__head{justify-content:flex-end;margin-bottom:.7rem}
  #stage .ws-game__score{
    background:rgba(125,211,252,.06);
    border:1px solid var(--line);
    border-radius:12px;
    font-family:var(--hud);
  }
  #stage .ws-game__score span{color:var(--muted)}
  #stage .ws-game__score strong{color:var(--cyan)}
  #stage .ws-game__foot{
    font-family:var(--hud);font-size:.82rem;color:var(--muted);
    margin-top:.7rem;
  }
  #stage .ws-game__foot .btn{
    appearance:none;cursor:pointer;font:inherit;
    color:var(--ink);background:rgba(125,211,252,.1);
    border:1px solid var(--line);border-radius:999px;padding:.5rem .9rem;
  }
  #stage .ws-game__foot .btn:hover{background:rgba(125,211,252,.18)}

  /* ---- Immersiv / fullskjerm (fungerer også der iOS nekter native fullscreen) ---- */
  body.immersive{overflow:hidden}
  body.immersive .bar{
    position:fixed;inset:0 0 auto 0;z-index:20;
    background:linear-gradient(180deg,rgba(6,21,40,.85),rgba(6,21,40,0));
    border-bottom:0;
  }
  body.immersive #stage{
    position:fixed;inset:0;z-index:10;
    width:100vw;height:100dvh;padding:0;
  }
  body.immersive #stage .ws-game{max-width:none;width:auto;display:flex;flex-direction:column;justify-content:center;height:100%}
  body.immersive #stage .ws-game__head,
  body.immersive #stage .ws-game__foot{display:none}  /* rent bilde – spillet starter på nytt med klikk/space etter game over */

  /* HUD-elementer som flyter oppå i immersiv modus */
  .hud{display:none}
  body.immersive .hud{
    display:flex;position:fixed;z-index:25;
    font-family:var(--hud);align-items:center;gap:.4rem;
    pointer-events:none;
  }
  body.immersive .hud--best{
    left:clamp(.7rem,3vw,1.4rem);bottom:clamp(.7rem,3vw,1.4rem);
    color:var(--muted);font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;
  }
  body.immersive .hud--best b{color:var(--cyan)}

  /* Liten toast for delingslenke */
  .toast{
    position:fixed;left:50%;bottom:1.4rem;transform:translateX(-50%) translateY(20px);
    background:rgba(6,21,40,.95);border:1px solid var(--line);
    color:var(--ink);font-family:var(--hud);font-size:.8rem;
    padding:.55rem .9rem;border-radius:999px;z-index:60;
    opacity:0;transition:opacity .2s ease,transform .2s ease;pointer-events:none;
    max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){
    .ctl,.toast{transition:none}
  }
</style>
</head>
<body>
  <header class="bar">
    <div class="wordmark"><span class="dot"></span>Spaceship</div>
    <div class="controls">
      <button class="ctl" id="shareBtn" type="button" aria-label="Del lenke">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        <span class="label">Del</span>
      </button>
      <button class="ctl" id="fsBtn" type="button" aria-label="Fullskjerm" aria-pressed="false">
        <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span class="label" id="fsLabel">Fullskjerm</span>
      </button>
    </div>
  </header>

  <main id="stage">
    <div id="app"></div>
  </main>

  <div class="hud hud--best" aria-hidden="true">Beste&nbsp;<b id="hudBest">0</b></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ====================================================================
       Standalone-shims: gir spillmodulen akkurat det den forventer.
       Lagring går rett til localStorage (samme nøkkel "wsp-workspaceship").
       Spillet under er UENDRET fra module-workspaceship-v7.js.
       ==================================================================== -->
  <script>
    window.Components = {
      esc:function(s){
        return String(s==null?"":s)
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      }
    };
    window.App = {
      store:{
        get:function(key,fallback){
          try{ var raw=localStorage.getItem(key); return raw?JSON.parse(raw):fallback; }
          catch(e){ return fallback; }
        },
        set:function(key,value){
          try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){}
        }
      }
    };
    window.Intranet = {
      registerModule:function(mod){
        var outlet=document.getElementById("app");
        outlet.innerHTML=mod.render();
        mod.mount(outlet,{},"");
      },
      logActivity:function(){},   // no-op standalone
      navigate:function(){}
    };
  </script>

  <!-- ============================ SPILLET (1:1) ============================ -->
  <script>
/* =============================================================================
   module-workspaceship.js — WORKSPACESHIP  (uendret innhold)
   ========================================================================== */
(function () {
  "use strict";

  var Intranet = window.Intranet;
  var App = window.App;
  var C = window.Components;
  if (!Intranet || !App || !C) return;

  var STORE_KEY = "wsp-workspaceship";

  function getState() {
    return App.store.get(STORE_KEY, { best: 0 }) || { best: 0 };
  }

  function setState(v) {
    App.store.set(STORE_KEY, v);
  }

  function render() {
    return '<div id="workspaceship-root"></div>';
  }

  function mount(outlet) {
    var root = outlet.querySelector("#workspaceship-root") || outlet;
    injectStyles();

    var saved = getState();

    root.innerHTML =
      '<div class="ws-game">' +
        '<div class="ws-game__head">' +
          '<div>' +
            '<p class="i-section-label">Easter egg</p>' +
            '<h2>Workspaceship</h2>' +
            '<p class="ws-game__hint">Hold inne <strong>Space</strong>, venstre museknapp eller touch for jevn thrust. Fly gjennom asteroidefeltet.</p>' +
          '</div>' +
          '<div class="ws-game__score">' +
            '<span>Beste</span>' +
            '<strong data-ws-best>' + C.esc(String(saved.best || 0)) + '</strong>' +
          '</div>' +
        '</div>' +
        '<div class="ws-canvas-wrap">' +
          '<canvas id="ws-canvas" width="720" height="420" aria-label="Workspaceship minigame"></canvas>' +
          '<div class="ws-overlay" data-ws-overlay>' +
            '<strong data-ws-title>Workspaceship</strong>' +
            '<span data-ws-text>Hold Space eller museknapp for å starte</span>' +
          '</div>' +
        '</div>' +
        '<div class="ws-game__foot">' +
          '<button class="btn btn--primary btn--sm" data-ws-restart>Start på nytt</button>' +
          '<span data-ws-status>Poeng: 0</span>' +
        '</div>' +
      '</div>';

    startGame(root);
  }

  function injectStyles() {
    if (document.getElementById("workspaceship-styles")) return;

    var s = document.createElement("style");
    s.id = "workspaceship-styles";
    s.textContent = [
      ".ws-game{max-width:820px;margin:0 auto}",
      ".ws-game__head{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;margin-bottom:1rem}",
      ".ws-game__head h2{margin:.1rem 0 .35rem}",
      ".ws-game__hint{margin:0;color:var(--color-muted);font-size:.92rem}",
      ".ws-game__score{min-width:84px;text-align:center;border:1px solid var(--color-border);border-radius:var(--radius);padding:.55rem .7rem;background:var(--color-surface)}",
      ".ws-game__score span{display:block;font-size:.72rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:.05em}",
      ".ws-game__score strong{font-size:1.4rem}",
      ".ws-canvas-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--color-border);background:#07111f}",
      "#ws-canvas{display:block;width:100%;height:auto;touch-action:none;cursor:pointer}",
      ".ws-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.35);color:white;gap:.3rem;pointer-events:none}",
      ".ws-overlay.is-hidden{display:none}",
      ".ws-overlay strong{font-size:1.6rem}",
      ".ws-overlay span{font-size:.95rem;opacity:.9}",
      ".ws-game__foot{display:flex;justify-content:space-between;align-items:center;margin-top:.8rem;color:var(--color-muted);font-size:.9rem}"
    ].join("");
    document.head.appendChild(s);
  }

  function startGame(root) {
    var canvas = root.querySelector("#ws-canvas");
    if (!canvas || !canvas.getContext) return;

    var ctx = canvas.getContext("2d");
    var overlay = root.querySelector("[data-ws-overlay]");
    var title = root.querySelector("[data-ws-title]");
    var text = root.querySelector("[data-ws-text]");
    var status = root.querySelector("[data-ws-status]");
    var bestEl = root.querySelector("[data-ws-best]");

    var W = canvas.width;
    var H = canvas.height;

    var ship;
    var obstacles;
    var stars;
    var particles;
    var score;
    var best;
    var running;
    var dead;
    var frame;
    var raf;
    var observer;
    var lastInput = 0;
    var thrusting = false;
    var nextFieldAt = 70;

    var GRAVITY = 0.235;
    var THRUST = -4.45;
    var MAX_FALL = 6.1;
    var SPEED = 2.55;
    var HOLD_THRUST = -0.34;

    function reset(waiting) {
      var saved = getState();
      best = saved.best || 0;
      bestEl.textContent = String(best);

      ship = { x: 120, y: H / 2, vy: 0, r: 15, rot: 0 };
      obstacles = [];
      stars = makeStars();
      particles = [];
      score = 0;
      frame = 0;
      running = !waiting;
      dead = false;
      lastInput = 0;
      thrusting = false;
      nextFieldAt = 70;

      overlay.classList.toggle("is-hidden", !waiting);
      title.textContent = "Workspaceship";
      text.textContent = "Hold Space eller museknapp for å starte";
      status.textContent = "Poeng: 0";
    }

    function makeStars() {
      var arr = [];
      var i;
      for (i = 0; i < 95; i++) {
        arr.push({
          x: Math.random() * W,
          y: Math.random() * H,
          s: Math.random() * 1.8 + 0.4,
          v: Math.random() * 0.8 + 0.2,
          a: Math.random() * 0.5 + 0.35
        });
      }
      return arr;
    }

    function beginThrust() {
      var now = Date.now();

      if (dead) {
        reset(false);
        thrusting = true;
        return;
      }

      if (!running) {
        running = true;
        overlay.classList.add("is-hidden");
      }

      thrusting = true;

      if (now - lastInput > 140) {
        ship.vy = Math.min(ship.vy, THRUST * 0.55);
        addThrustParticles();
      }
      lastInput = now;
    }

    function endThrust() {
      thrusting = false;
    }

    function addThrustParticles() {
      var i;
      for (i = 0; i < 7; i++) {
        particles.push({
          x: ship.x - 23,
          y: ship.y + (Math.random() * 10 - 5),
          vx: -1.5 - Math.random() * 2.4,
          vy: Math.random() * 1.8 - 0.9,
          life: 18 + Math.random() * 8,
          size: 2 + Math.random() * 3
        });
      }
    }

    function spawnField() {
      var laneCount = 5;
      var laneH = H / laneCount;
      var safeLane = Math.floor(Math.random() * laneCount);
      var amount = 2 + Math.floor(Math.random() * Math.min(3, 1 + Math.floor(score / 7)));
      var used = {};
      var i;

      used[safeLane] = true;
      if (safeLane > 0 && Math.random() < 0.55) used[safeLane - 1] = true;
      if (safeLane < laneCount - 1 && Math.random() < 0.55) used[safeLane + 1] = true;

      for (i = 0; i < amount; i++) {
        var lane = pickBlockedLane(laneCount, used);
        if (lane === null) break;

        used[lane] = true;

        var minY = lane * laneH + 24;
        var maxY = (lane + 1) * laneH - 24;
        var y = minY + Math.random() * Math.max(1, maxY - minY);

        var r = 9 + Math.random() * 10;
        if (score > 14) r += Math.random() * 1.6;
        if (score > 30) r += Math.random() * 1.4;

        obstacles.push({
          x: W + 70 + Math.random() * 150,
          y: y,
          r: r,
          rot: Math.random() * Math.PI,
          vr: -0.022 + Math.random() * 0.044,
          color: randomPlanetColor(),
          comet: Math.random() < Math.min(0.48, 0.28 + score * 0.007),
          passed: false
        });
      }

      nextFieldAt = frame + Math.max(62, 94 - Math.min(score, 30) * 0.85);
    }

    function pickBlockedLane(laneCount, used) {
      var candidates = [];
      var i;
      for (i = 0; i < laneCount; i++) {
        if (!used[i]) candidates.push(i);
      }
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function randomPlanetColor() {
      var colors = ["#8b5cf6", "#22c55e", "#06b6d4", "#f97316", "#ec4899", "#64748b", "#f59e0b"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function update() {
      frame++;

      stars.forEach(function (st) {
        st.x -= st.v;
        if (st.x < 0) {
          st.x = W;
          st.y = Math.random() * H;
        }
      });

      particles.forEach(function (p) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.size *= 0.97;
      });
      particles = particles.filter(function (p) { return p.life > 0; });

      if (!running || dead) return;

      ship.vy = Math.min(MAX_FALL, ship.vy + GRAVITY);

      if (thrusting) {
        ship.vy += HOLD_THRUST;
        ship.vy = Math.max(ship.vy, -4.9);
        if (frame % 3 === 0) addThrustParticles();
      }

      ship.y += ship.vy;
      ship.rot = Math.max(-0.45, Math.min(0.74, ship.vy / 11));

      if (frame >= nextFieldAt) spawnField();

      obstacles.forEach(function (o) {
        o.x -= SPEED + Math.min(score * 0.010, 0.34) + (o.comet ? 0.48 : 0);
        o.rot += o.vr;

        if (!o.passed && o.x + o.r < ship.x) {
          o.passed = true;
          score++;
          status.textContent = "Poeng: " + score;
        }

        if (circleHit(ship.x, ship.y, ship.r, o.x, o.y, o.r - 1.5)) {
          gameOver();
        }
      });

      obstacles = obstacles.filter(function (o) {
        return o.x > -60;
      });

      if (ship.y < -20 || ship.y > H + 20) gameOver();
    }

    function circleHit(x1, y1, r1, x2, y2, r2) {
      var dx = x1 - x2;
      var dy = y1 - y2;
      var rr = r1 + r2;
      return dx * dx + dy * dy < rr * rr;
    }

    function gameOver() {
      if (dead) return;

      dead = true;
      running = false;

      if (score > best) {
        best = score;
        setState({ best: best });
        bestEl.textContent = String(best);

        if (Intranet.logActivity) {
          Intranet.logActivity({
            type: "workspaceship_best",
            label: "Ny Workspaceship-rekord: " + best
          });
        }
      }

      title.textContent = "Game over";
      text.textContent = "Poeng: " + score + " — Space/klikk for ny runde";
      overlay.classList.remove("is-hidden");
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawBackground();
      drawStars();
      drawParticles();

      obstacles.forEach(drawObstacle);

      drawShip();

      raf = requestAnimationFrame(loop);
    }

    function drawBackground() {
      var grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#061528");
      grad.addColorStop(0.55, "#101827");
      grad.addColorStop(1, "#1e1b4b");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = 0.14;
      ctx.fillStyle = "#7dd3fc";
      ctx.beginPath();
      ctx.arc(W * 0.78, H * 0.20, 110, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawStars() {
      stars.forEach(function (st) {
        ctx.fillStyle = "rgba(255,255,255," + st.a + ")";
        ctx.beginPath();
        ctx.arc(st.x, st.y, st.s, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawParticles() {
      particles.forEach(function (p) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 26);
        ctx.fillStyle = p.life % 2 > 1 ? "#f97316" : "#facc15";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawObstacle(o) {
      if (o.comet) drawComet(o);
      else drawMiniPlanet(o);
    }

    function drawComet(o) {
      ctx.save();

      var glow = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * 2.4);
      glow.addColorStop(0, "rgba(255,255,255,.28)");
      glow.addColorStop(0.45, "rgba(125,211,252,.16)");
      glow.addColorStop(1, "rgba(125,211,252,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r * 2.4, 0, Math.PI * 2);
      ctx.fill();

      var tail = ctx.createLinearGradient(o.x + o.r * 5.2, o.y, o.x, o.y);
      tail.addColorStop(0, "rgba(125,211,252,0)");
      tail.addColorStop(0.55, "rgba(125,211,252,.22)");
      tail.addColorStop(1, "rgba(255,255,255,.62)");
      ctx.fillStyle = tail;
      ctx.beginPath();
      ctx.moveTo(o.x + o.r * 5.2, o.y - o.r * 0.72);
      ctx.lineTo(o.x + o.r * 4.2, o.y);
      ctx.lineTo(o.x + o.r * 5.2, o.y + o.r * 0.72);
      ctx.lineTo(o.x - o.r * 0.15, o.y + o.r * 0.28);
      ctx.lineTo(o.x - o.r * 0.15, o.y - o.r * 0.28);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.36;
      ctx.fillStyle = "#fef3c7";
      ctx.beginPath();
      ctx.moveTo(o.x + o.r * 3.4, o.y - o.r * 0.28);
      ctx.lineTo(o.x + o.r * 1.1, o.y);
      ctx.lineTo(o.x + o.r * 3.4, o.y + o.r * 0.28);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);

      var body = ctx.createRadialGradient(-o.r * 0.35, -o.r * 0.35, o.r * 0.1, 0, 0, o.r * 1.15);
      body.addColorStop(0, "#f8fafc");
      body.addColorStop(0.35, "#cbd5e1");
      body.addColorStop(1, "#64748b");
      ctx.fillStyle = body;

      ctx.beginPath();
      ctx.moveTo(o.r, -o.r * 0.12);
      ctx.lineTo(o.r * 0.55, o.r * 0.72);
      ctx.lineTo(-o.r * 0.25, o.r * 0.95);
      ctx.lineTo(-o.r * 0.95, o.r * 0.28);
      ctx.lineTo(-o.r * 0.70, -o.r * 0.62);
      ctx.lineTo(o.r * 0.25, -o.r * 0.92);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,.35)";
      ctx.lineWidth = 1.2;
      ctx.stroke();

      drawCrater(-o.r * 0.22, -o.r * 0.15, o.r * 0.23);
      drawCrater(o.r * 0.25, o.r * 0.18, o.r * 0.16);
      drawCrater(o.r * 0.12, -o.r * 0.42, o.r * 0.12);

      ctx.restore();
    }

    function drawCrater(x, y, r) {
      ctx.save();
      ctx.globalAlpha = 0.34;
      ctx.fillStyle = "#0f172a";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = Math.max(1, r * 0.25);
      ctx.beginPath();
      ctx.arc(x - r * 0.12, y - r * 0.12, r * 0.82, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawMiniPlanet(o) {
      var grad = ctx.createRadialGradient(o.x - o.r * 0.25, o.y - o.r * 0.25, o.r * 0.08, o.x, o.y, o.r);
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.22, o.color);
      grad.addColorStop(1, "#111827");

      ctx.save();

      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = Math.max(2, o.r * 0.16);
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, o.r * 1.15, o.r * 0.32, -0.25, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000000";
      ctx.beginPath();
      ctx.arc(o.x - o.r * 0.20, o.y - o.r * 0.12, o.r * 0.18, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.rot);

      if (running && (thrusting || ship.vy < 1.0)) {
        var flame = ctx.createLinearGradient(-18, 0, -38, 0);
        flame.addColorStop(0, "#facc15");
        flame.addColorStop(1, "#ef4444");
        ctx.fillStyle = flame;
        ctx.beginPath();
        ctx.moveTo(-15, -7);
        ctx.lineTo(-37 - Math.random() * 6, 0);
        ctx.lineTo(-15, 7);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.moveTo(-6, 9);
      ctx.lineTo(-19, 20);
      ctx.lineTo(-14, 4);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-6, -9);
      ctx.lineTo(-19, -20);
      ctx.lineTo(-14, -4);
      ctx.closePath();
      ctx.fill();

      var body = ctx.createLinearGradient(-18, 0, 22, 0);
      body.addColorStop(0, "#cbd5e1");
      body.addColorStop(0.45, "#ffffff");
      body.addColorStop(1, "#e5e7eb");

      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(25, 0);
      ctx.bezierCurveTo(15, -18, -9, -16, -21, -8);
      ctx.bezierCurveTo(-16, -3, -16, 3, -21, 8);
      ctx.bezierCurveTo(-9, 16, 15, 18, 25, 0);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(15,23,42,.25)";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.moveTo(25, 0);
      ctx.bezierCurveTo(19, -8, 15, -10, 11, -11);
      ctx.bezierCurveTo(14, -4, 14, 4, 11, 11);
      ctx.bezierCurveTo(15, 10, 19, 8, 25, 0);
      ctx.fill();

      ctx.fillStyle = "#38bdf8";
      ctx.beginPath();
      ctx.arc(2, -2, 5.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.55;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(0, -4, 2.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function loop() {
      update();
      draw();
    }

    function keyDownHandler(e) {
      if (e.code === "Space") {
        e.preventDefault();
        beginThrust();
      }
    }

    function keyUpHandler(e) {
      if (e.code === "Space") {
        e.preventDefault();
        endThrust();
      }
    }

    canvas.addEventListener("pointerdown", function (e) {
      if (e.button !== undefined && e.button !== 0) return;
      beginThrust();
    });
    canvas.addEventListener("pointerup", endThrust);
    canvas.addEventListener("pointerleave", endThrust);
    canvas.addEventListener("pointercancel", endThrust);

    root.querySelector("[data-ws-restart]").addEventListener("click", function () {
      reset(false);
    });

    document.addEventListener("keydown", keyDownHandler);
    document.addEventListener("keyup", keyUpHandler);

    reset(true);
    loop();

    observer = new MutationObserver(function () {
      if (!document.body.contains(root)) {
        cancelAnimationFrame(raf);
        document.removeEventListener("keydown", keyDownHandler);
        document.removeEventListener("keyup", keyUpHandler);
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  Intranet.registerModule({
    id: "workspaceship",
    navLabel: "Workspaceship",
    icon: "rocket",
    order: 999,
    render: render,
    mount: mount
  });

})();
  </script>

  <!-- ================= Wrapper: fullskjerm, orientering, deling ================= -->
  <script>
  (function(){
    "use strict";
    var body = document.body;
    var fsBtn = document.getElementById("fsBtn");
    var fsLabel = document.getElementById("fsLabel");
    var shareBtn = document.getElementById("shareBtn");
    var hudBest = document.getElementById("hudBest");
    var toastEl = document.getElementById("toast");
    var STORE_KEY = "wsp-workspaceship";

    /* --- Skaler lerretet så det fyller mest mulig i begge orienteringer ---
       Spillets logiske flate er låst til 720x420 (uendret gameplay).
       Vi setter bredden på wrapen; lerretet er width:100%/height:auto og følger med. */
    function fitStage(){
      var wrap = document.querySelector(".ws-canvas-wrap");
      if(!wrap) return;
      if(body.classList.contains("immersive")){
        var vw = (window.visualViewport && window.visualViewport.width)  || window.innerWidth;
        var vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
        var w = Math.min(vw, vh * (720/420));
        wrap.style.width = Math.floor(w) + "px";
      } else {
        wrap.style.width = "";   // tilbake til kort-bredden
      }
    }

    /* --- Speil beste-score til flytende HUD i immersiv modus --- */
    function refreshHudBest(){
      try{
        var raw = localStorage.getItem(STORE_KEY);
        var v = raw ? JSON.parse(raw) : null;
        hudBest.textContent = String((v && v.best) || 0);
      }catch(e){ /* ignorer */ }
    }

    /* --- Fullskjerm: ekte Fullscreen API der det støttes, ellers CSS-immersiv (iOS) --- */
    function nativeFs(){ return document.fullscreenElement || document.webkitFullscreenElement; }

    function enter(){
      body.classList.add("immersive");
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen;
      if(req){ try{ var p = req.call(el); if(p && p.catch) p.catch(function(){}); }catch(e){} }
      sync();
    }
    function leave(){
      body.classList.remove("immersive");
      if(nativeFs()){
        var ex = document.exitFullscreen || document.webkitExitFullscreen;
        if(ex){ try{ var p = ex.call(document); if(p && p.catch) p.catch(function(){}); }catch(e){} }
      }
      sync();
    }
    function toggle(){ body.classList.contains("immersive") ? leave() : enter(); }

    function sync(){
      var on = body.classList.contains("immersive");
      fsBtn.setAttribute("aria-pressed", on ? "true" : "false");
      fsLabel.textContent = on ? "Avslutt" : "Fullskjerm";
      refreshHudBest();
      fitStage();
    }

    /* Hvis bruker går ut av native fullskjerm med Esc, fjern også immersiv-klassen */
    function onFsChange(){
      if(!nativeFs() && body.classList.contains("immersive")) body.classList.remove("immersive");
      sync();
    }

    /* --- Deling: Web Share der det finnes, ellers kopier lenke --- */
    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
    }
    function share(){
      var url = location.href;
      var data = { title:"Spaceship", text:"Klarer du å slå rekorden?", url:url };
      if(navigator.share){
        navigator.share(data).catch(function(){ /* avbrutt – ingen handling */ });
        return;
      }
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url)
          .then(function(){ toast("Lenke kopiert"); })
          .catch(function(){ toast(url); });
      } else {
        toast(url);
      }
    }

    fsBtn.addEventListener("click", toggle);
    shareBtn.addEventListener("click", share);
    document.addEventListener("fullscreenchange", onFsChange);
    document.addEventListener("webkitfullscreenchange", onFsChange);
    window.addEventListener("resize", fitStage);
    window.addEventListener("orientationchange", function(){ setTimeout(fitStage, 150); });
    if(window.visualViewport) window.visualViewport.addEventListener("resize", fitStage);

    /* Esc lukker også CSS-fallback-fullskjerm der native ikke var aktiv (iOS) */
    document.addEventListener("keydown", function(e){
      if(e.key === "Escape" && body.classList.contains("immersive") && !nativeFs()) leave();
    });

    refreshHudBest();
    fitStage();
  })();
  </script>
</body>
